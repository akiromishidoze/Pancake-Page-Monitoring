services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./backups:/app/backups
    environment:
      - DATABASE_URL=postgresql://user:password@host.docker.internal:5432/botcake_monitor
      - PORT=3001
      - FB_ACCESS_TOKEN=${FB_ACCESS_TOKEN:-}
    restart: unless-stopped
